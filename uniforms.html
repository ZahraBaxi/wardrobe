</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand"><span class="mark">IA / 03</span> My Wardrobe</a>
    <button class="nav-toggle" aria-label="Toggle navigation">Menu</button>
    <nav class="site-nav">

</header>

<main>
  <section class="tight">
    <div class="wrap">
      <p class="eyebrow">Article I, Purpose</p>
      <h1>Uniforms</h1>
      <p class="lede">Not outfits, systems. Every garment belongs to at least one of these six.</p>

      <div class="uniform-grid" id="uniform-grid" style="margin-top:var(--space-3)"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>Every garment should belong to at least one uniform.</span>
    <span>&larr; <a href="index.html" style="text-decoration:none">Back home</a></span>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/back4app-client.js"></script>
<script src="js/wardrobe-loader.js"></script>
<script src="js/app.js"></script>
<script>
  const grid = document.getElementById("uniform-grid");
  grid.innerHTML = `<div class="empty-state">Loading…</div>`;
  wardrobeReady.then(() => {
    grid.innerHTML = "";
    UNIFORMS.forEach((u, i) => {
      const garments = u.keyGarments.map(byId).filter(Boolean);
      const card = document.createElement("div");
      card.className = "uniform-card";
      card.innerHTML = `
        <h3><span class="num">${String(i + 1).padStart(2, "0")}</span> ${u.name}</h3>
        <p style="font-size:0.92rem; color:var(--ink-soft)">${u.purpose}</p>
        <dl class="kv-list">
          <dt>Key Garments</dt>
          <dd>${garments.length ? garments.map((g) => g.name).join(", ") : "None assigned yet"}</dd>
          <dt>Suggested Combinations</dt>
          <dd>${u.combos.length ? u.combos.join(" &middot; ") : ","}</dd>
          <dt>Packing List</dt>
          <dd>${u.packingList.join(", ")}</dd>
        </dl>
      `;
      grid.appendChild(card);
    });
  });
</script>
</body>
</html>
