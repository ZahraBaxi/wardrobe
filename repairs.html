<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand"><span class="mark">IA / 05</span> My Wardrobe</a>
    <button class="nav-toggle" aria-label="Toggle navigation">Menu</button>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="wardrobe.html">Wardrobe</a>

      <a href="about.html">About</a>
      <a href="closet-admin.html">Admin</a>
    </nav>
  </div>
</header>

<main>
  <section class="tight">
    <div class="wrap">
      <p class="eyebrow">Article XI, Mending</p>
      <h1>Repairs</h1>
      <p class="lede">A repaired garment is not damaged. It is lived in.</p>

      <div class="timeline" style="margin-top:var(--space-4)" id="timeline"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>Repair before replacing.</span>
    <span>&larr; <a href="index.html" style="text-decoration:none">Back home</a></span>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/back4app-client.js"></script>
<script src="js/wardrobe-loader.js"></script>
<script src="js/app.js"></script>
<script>
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = `<div class="empty-state">Loading…</div>`;

  wardrobeReady.then(() => {
    const sorted = [...REPAIRS].sort((a, b) => new Date(b.date) - new Date(a.date));

    timeline.innerHTML = "";
    sorted.forEach((r) => {
      const g = byId(r.garmentId);
      const entry = document.createElement("div");
      entry.className = "repair-entry";
      entry.innerHTML = `
        <div class="repair-date">${formatDate(r.date)}</div>
        <h3 style="margin-top:0.3em">${g ? g.name : "Unknown garment"}</h3>
        <div class="repair-photos">
          <div>Before Photo</div>
          <div>After Photo</div>
        </div>
        <p class="repair-meta">
          Method: ${r.method}<br>
          Thread color: ${r.thread}<br>
          Patch material: ${r.patchMaterial}
        </p>
        <p>${r.notes}</p>
        ${g ? `<a class="btn quiet" href="item.html?id=${g.id}">View garment &rarr;</a>` : ""}
      `;
      timeline.appendChild(entry);
    });

    if (!sorted.length) {
      timeline.innerHTML = `<div class="empty-state">No repairs logged yet.</div>`;
    }
  });
</script>
</body>
</html>
